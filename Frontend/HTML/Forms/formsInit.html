<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            
            <legend>Registration form</legend>
            First name:<br><input type="text" name="first_name"><br><br>
            
            Last name:<br><input type="text" name="last_name"><br><br>
            
            Username :<br><input type="text" name="username"><br><br>
            
            <input type="hidden" name="pancard">
            
            Date of Birth:<br><input type="date" name="dob"><br><br>
            
            Email id:<br><input type="email" name="email"><br><br>
            
            Gender:<br><input type="radio" name="gender" value="male"> Male
            
            <input type="radio" name="gender" value="female"> Female<br><br>
            
            Select your file:<br><input type="file" name="file" restrict=".jpg"><br><br>
            
            <input type="submit" value="Submit" onclick="return alert('Form Submitted')">  

        </fieldset>
    </form>
    
</body>
</html>
