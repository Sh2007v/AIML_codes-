<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Example 3</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color:white;
        }

        h1{
            text-align:center;
            text-decoration:underline;
            margin-top:20px;
        }

        p{
            text-align:center;
            font-size:18px;
        }

        .navbar{
            position:fixed;
            top:100px;
            left:0;
            width:100%;
            background:#00cfe6;
            border:2px solid green;
        }

        .navbar ul{
            list-style:none;
            margin:0;
            padding:0;
            display:flex;
        }

        .navbar ul li{
            flex:1;
            text-align:center;
            border-right:2px solid green;
        }

        .navbar ul li:last-child{
            border-right:none;
        }

        .navbar ul li a{
            display:block;
            text-decoration:none;
            color:black;
            padding:12px;
        }

        .navbar ul li a:hover{
            background:#00b8cc;
        }

        .content{
            margin-top:150px;
            background:#b8ffb8;
            height:500px;
            border:2px solid green;
            padding:20px;
        }

        .content h2{
            margin-top:50px;
            margin-bottom:80px;
            font-size:28px;
        }

    </style>

</head>
<body>

    <h1>CSS Example 3</h1>

    <p>Try to create the fixed navigation bar at top by applying stylesheet.</p>

    <div class="navbar">

        <ul>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact Us</a></li>
            <li><a href="#">Login</a></li>
            <li><a href="#">Logout</a></li>
        </ul>

    </div>

    <div class="content">

        <h2>Services</h2>

        <h2>Offers</h2>

        <h2>Clients</h2>

    </div>

</body>
</html>
